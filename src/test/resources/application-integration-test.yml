camunda:
  process-test:
    # Enable the connectors for LLM integration testing
    runtime-mode: managed
    connectors-enabled: true
    # Set connector secrets for the AI connector
    # Load the secrets from environment variables for security
    connectors-secrets:
      AWS_BEDROCK_ACCESS_KEY: ${AWS_BEDROCK_ACCESS_KEY}
      AWS_BEDROCK_SECRET_KEY: ${AWS_BEDROCK_SECRET_KEY}
    # Configure the judge for assertions
    judge:
      chat-model:
        provider: amazon-bedrock
        model: "eu.anthropic.claude-haiku-4-5-20251001-v1:0"
        region: eu-central-1
        credentials:
          access-key: ${AWS_BEDROCK_ACCESS_KEY}
          secret-key: ${AWS_BEDROCK_SECRET_KEY}
