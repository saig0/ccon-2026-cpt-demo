spring:
  application:
    name: CCon 2026 - CPT demo

  datasource:
    url: jdbc:h2:mem:product-catalog;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none

  sql:
    init:
      mode: always

  jackson:
    deserialization:
      REQUIRE_HANDLERS_FOR_JAVA8_TIMES: true

logging:
  level:
    root: warn
    io:
      camunda:
        demo: debug
        client:
          impl:
            CamundaCallCredentials: error